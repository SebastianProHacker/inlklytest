<app-dynamic-modal [data]="{ title: 'New Product' }">
    <form [formGroup]="materialForm" (ngSubmit)="onSubmit()" class="material-form">
      
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" formControlName="name" placeholder="Ink, Needle, etc...">
      </div>
  
      <div class="form-group">
        <label>Category / Type</label>
        <select formControlName="materialTypeId" (change)="onTypeChange($event)">
          <option [ngValue]="null" disabled>Select a type...</option>
          <option *ngFor="let type of materialTypes" [value]="type.id">{{ type.name }}</option>
          <option value="new">+ Add New Type...</option>
        </select>
      </div>
  
      <div class="form-group animate-fade" *ngIf="showNewTypeInput">
        <label>New Category Name</label>
        <input type="text" formControlName="newTypeName" placeholder="Name of the new category...">
      </div>
  
      <div class="form-row">
        <div class="form-group">
          <label>Unit Cost ($)</label>
          <input type="number" formControlName="unitCost" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Unit Measure</label>
          <input type="text" formControlName="unitMeasure" placeholder="pcs, ml, box...">
        </div>
      </div>
  
      <footer class="form-actions">
        <app-action-button text="Cancel" variant="secondary" (click)="onCancel()"></app-action-button>
        <app-action-button text="Create Product" variant="primary" type="submit"></app-action-button>
      </footer>
    </form>
  </app-dynamic-modal>
