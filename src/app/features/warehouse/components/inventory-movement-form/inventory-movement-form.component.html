<app-dynamic-modal [data]="{ title: 'Register Movement' }">
  <form [formGroup]="movementForm" (ngSubmit)="onSubmit()" class="movement-form">

    <div class="form-group">
      <label>Material</label>
      <select formControlName="materialId">
        <option [ngValue]="null" disabled>Select a material...</option>
        <option *ngFor="let m of materials" [value]="m.id">{{ m.name }} ({{ m.unitMeasure }})</option>
      </select>
    </div>

    <div class="form-group">
      <label>Movement Type</label>
      <div class="movement-type-toggle">
        <label class="toggle-option" [class.active]="movementForm.get('movementType')?.value === 'entrada'">
          <input type="radio" formControlName="movementType" value="entrada">
          <span class="dot entrada"></span>
          Entry (Entrada)
        </label>
        <label class="toggle-option" [class.active]="movementForm.get('movementType')?.value === 'salida'">
          <input type="radio" formControlName="movementType" value="salida">
          <span class="dot salida"></span>
          Exit (Salida)
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="number" formControlName="quantity" placeholder="0" min="0.01" step="0.01">
    </div>

    <div class="form-group">
      <label>Reference / Note</label>
      <input type="text" formControlName="referenceType" placeholder="manual, appointment, purchase...">
    </div>

    <footer class="form-actions">
      <app-action-button text="Cancel" variant="secondary" (click)="onCancel()"></app-action-button>
      <app-action-button text="Register" variant="primary" type="submit" [isLoading]="isSubmitting"></app-action-button>
    </footer>
  </form>
</app-dynamic-modal>
